<svg xmlns="http://www.w3.org/2000/svg" viewBox="-2 -2 70 70" fill="none"
     stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">

  <!-- Document with rounded corners -->
  <rect x="3" y="2" width="49" height="62" rx="5" stroke-width="3.5"/>

  <!-- Checkbox 1 -->
  <rect x="8" y="9" width="14" height="14" rx="2.5" stroke-width="3"/>
  <polyline points="10.5,16 13.5,19 19,12" stroke-width="3"/>

  <!-- Checkbox 2 -->
  <rect x="8" y="27" width="14" height="14" rx="2.5" stroke-width="3"/>
  <polyline points="10.5,34 13.5,37 19,30" stroke-width="3"/>

  <!-- Checkbox 3 -->
  <rect x="8" y="45" width="14" height="14" rx="2.5" stroke-width="3"/>
  <polyline points="10.5,52 13.5,55 19,48" stroke-width="3"/>

  <!-- Text lines — row 1 -->
  <line x1="26" y1="13" x2="46" y2="13" stroke-width="2.5"/>
  <line x1="26" y1="19" x2="44" y2="19" stroke-width="2.5"/>

  <!-- Text lines — row 2 -->
  <line x1="26" y1="31" x2="46" y2="31" stroke-width="2.5"/>
  <line x1="26" y1="37" x2="42" y2="37" stroke-width="2.5"/>

  <!-- Text lines — row 3 -->
  <line x1="26" y1="49" x2="46" y2="49" stroke-width="2.5"/>
  <line x1="26" y1="55" x2="43" y2="55" stroke-width="2.5"/>

  <!-- Pen body (diagonal, overlapping bottom-right of doc) -->
  <path d="M40 45 L55 60 L50 65 L35 50 Z" stroke-width="2.5"/>
  <!-- Pen tip -->
  <path d="M35 50 L31 63 L44 59 Z" fill="currentColor" stroke="currentColor" stroke-width="1.5"/>
  <!-- Pen grip line -->
  <line x1="37" y1="48" x2="53" y2="63" stroke-width="1.5"/>
  <!-- Pen top cap -->
  <rect x="49" y="37" width="11" height="11" rx="2"
        transform="rotate(45 54.5 42.5)" stroke-width="2.5"/>
</svg>
